<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行スケジュール管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f3f4f6; }
        .screen { display: none; }
        .screen.active { display: block; }
        /* 既存のCSS（スクロールバー設定など）はそのまま継承します */
        .wbs-scroll::-webkit-scrollbar { height: 6px; }
        .wbs-scroll::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 4px; }
        .wbs-scroll::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 4px; }
        .day-panel { display: flex; flex-direction: column; height: calc(100vh - 220px); min-height: 500px; background: white; border-radius: 0.75rem; border: 1px solid #e5e7eb; overflow: hidden; }
        .day-map-header { flex-shrink: 0; background: #f3f4f6; border-bottom: 2px solid #e5e7eb; padding: 10px 12px 12px; }
        .day-schedule-body { flex: 1 1 0; overflow-y: auto; padding: 16px 12px 80px; }
    </style>
<link rel="manifest" href="manifest.json">
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('Service Worker Registered'));
  }
</script>
</head>
<body class="p-2 sm:p-4 max-w-4xl mx-auto text-gray-800 relative text-sm sm:text-base">

    <div id="screen-start" class="screen active min-h-screen flex flex-col items-center justify-center -mt-10">
        <div class="bg-white p-8 rounded-2xl shadow-lg text-center max-w-sm w-full">
            <i class="fa-solid fa-plane-departure text-5xl text-blue-500 mb-4"></i>
            <h1 class="text-2xl font-bold mb-2">Travel Planner</h1>
            <p class="text-gray-500 text-sm mb-8">Googleアカウントでログインして始めましょう</p>
            
            <button onclick="loginAndShowMenu()" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-3 px-4 rounded-full flex items-center justify-center gap-3 shadow-sm hover:bg-gray-50 transition-all mb-6">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
                Googleでログイン
            </button>

            <div id="menu-options" class="hidden flex-col gap-3">
                <button onclick="switchScreen('screen-create')" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md hover:bg-blue-700">
                    <i class="fa-solid fa-plus-circle mr-2"></i>新規旅行を作成
                </button>
                <button onclick="loadPastTrips()" class="w-full bg-gray-100 text-gray-700 font-bold py-3 rounded-xl shadow-sm border border-gray-200 hover:bg-gray-200">
                    <i class="fa-solid fa-clock-rotate-left mr-2"></i>過去の記録を見る
                </button>
            </div>
        </div>
    </div>

    <div id="screen-create" class="screen pb-20">
        <header class="bg-gradient-to-r from-blue-600 to-teal-500 text-white p-4 rounded-xl shadow-md mb-4 flex items-center gap-3">
            <button onclick="switchScreen('screen-start')" class="text-white hover:bg-white/20 p-2 rounded-full"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-xl font-bold">新規旅行プラン作成</h1>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm space-y-5">
            <div>
                <label class="block text-gray-700 font-bold mb-2">旅行先（メイン目的地）</label>
                <input type="text" id="trip-dest" placeholder="例: 福岡・糸島" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-2">出発日時</label>
                    <input type="datetime-local" id="trip-start" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-sm">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-2">帰宅日時</label>
                    <input type="datetime-local" id="trip-end" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-gray-700 font-bold mb-2">メインの目的（いつ行くか）</label>
                <input type="date" id="trip-main-date" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 text-sm mb-2">
            </div>
            <div>
                <label class="block text-gray-700 font-bold mb-2">やりたいアクティビティ（複数選択可）</label>
                <div class="grid grid-cols-2 gap-2 text-sm">
                    <label class="flex items-center gap-2 p-2 border rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" class="activity-cb" value="温泉"> 温泉</label>
                    <label class="flex items-center gap-2 p-2 border rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" class="activity-cb" value="グルメ"> グルメ・食べ歩き</label>
                    <label class="flex items-center gap-2 p-2 border rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" class="activity-cb" value="絶景"> 絶景スポット</label>
                    <label class="flex items-center gap-2 p-2 border rounded cursor-pointer hover:bg-gray-50"><input type="checkbox" class="activity-cb" value="神社仏閣"> 神社仏閣・歴史</label>
                </div>
            </div>
            
            <button onclick="generateSchedule()" class="w-full mt-4 bg-gradient-to-r from-teal-500 to-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90 text-lg">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>スケジュールを自動生成
            </button>
        </div>
    </div>

    <div id="screen-dashboard" class="screen">
        <header class="bg-gradient-to-r from-blue-600 to-teal-500 text-white p-4 rounded-xl shadow-md mb-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wider" id="dash-title"><i class="fa-solid fa-compass mr-2"></i> 旅行ダッシュボード</h1>
            <button onclick="switchScreen('screen-start')" class="text-xs bg-white/20 p-2 rounded"><i class="fa-solid fa-house"></i></button>
        </header>
        
        <section class="bg-white p-4 rounded-xl shadow-sm mb-4">
            <h2 class="text-sm font-bold text-gray-700 mb-2">全行程WBS進捗</h2>
            <div id="wbs-wrapper" class="wbs-scroll overflow-x-auto flex gap-2 pb-2 text-center text-xs whitespace-nowrap"></div>
        </section>

        <section id="schedule-section">
            <div id="timeline-container" class="flex overflow-x-auto snap-x snap-mandatory items-stretch pb-4 -mx-1 sm:-mx-2"></div>
        </section>
        
        <button id="floating-save-btn" class="fixed bottom-6 right-4 bg-red-600 text-white font-bold px-6 py-4 rounded-full shadow-lg z-[9000]">
            <i class="fa-solid fa-floppy-disk"></i> 保存する
        </button>
    </div>

<script>
    // --- 画面遷移の制御 ---
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // --- Google認証モック ---
    function loginAndShowMenu() {
        // ※実際はここでFirebase Authなどを呼び出す
        document.querySelector('#screen-start button').classList.add('hidden');
        document.getElementById('menu-options').classList.remove('hidden');
        document.getElementById('menu-options').classList.add('flex');
    }

    // --- スケジュール自動生成ロジック ---
    let appState = { travelDays: 1, itinerary: [], statuses: {} };

    function generateSchedule() {
        const dest = document.getElementById('trip-dest').value || "旅行";
        const startRaw = document.getElementById('trip-start').value;
        const endRaw = document.getElementById('trip-end').value;
        const mainDate = document.getElementById('trip-main-date').value;
        
        if(!startRaw || !endRaw) {
            alert("出発日時と帰宅日時を入力してください。"); return;
        }

        const startDate = new Date(startRaw);
        const endDate = new Date(endRaw);
        
        // 日数を計算
        const diffTime = Math.abs(endDate - startDate);
        const travelDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) || 1;
        appState.travelDays = travelDays;
        appState.itinerary = [];

        // アクティビティ取得
        let activities = [];
        document.querySelectorAll('.activity-cb:checked').forEach(cb => activities.push(cb.value));

        // 1日目: 出発の簡易スケジュール生成
        appState.itinerary.push({ 
            id: Date.now(), day: 1, 
            time: startDate.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}), 
            title: `出発（自宅・空港など）`, map: "", comment: "" 
        });

        // メイン日時のスケジュール
        let mainDayNum = 1;
        if(mainDate) {
            const mDate = new Date(mainDate);
            mainDayNum = Math.ceil((mDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
            if(mainDayNum > travelDays || mainDayNum < 1) mainDayNum = 1; // 範囲外補正
        }

        appState.itinerary.push({ 
            id: Date.now()+1, day: mainDayNum, 
            time: "12:00", 
            title: `メイン目的地到着：${dest}`, map: "", comment: "メインの目的を達成する！\n" + activities.join(', ') + "を楽しむ"
        });

        // 最終日: 帰宅の簡易スケジュール
        appState.itinerary.push({ 
            id: Date.now()+2, day: travelDays, 
            time: endDate.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'}), 
            title: `帰宅完了`, map: "", comment: "お疲れ様でした！"
        });

        // 生成後にダッシュボード画面へ遷移
        document.getElementById('dash-title').innerHTML = `<i class="fa-solid fa-compass mr-2"></i> ${dest}旅行`;
        switchScreen('screen-dashboard');
        
        // 元々のあなたの描画関数を呼び出す（※ここでは簡易版を呼び出します）
        renderTimelineAndWBS();
    }

    function loadPastTrips() {
        // ※実際はここでFirebase等から取得
        alert("クラウドから過去の旅行データを取得します。");
        switchScreen('screen-dashboard');
    }

    // --- 以下、提供いただいた元コードの描画ロジックの簡易実装 ---
    function renderTimelineAndWBS() {
        const tc = document.getElementById('timeline-container');
        tc.innerHTML = '';
        for(let d = 1; d <= appState.travelDays; d++){
            const dayItems = appState.itinerary.filter(i => i.day === d);
            let html = `<div class="min-w-[90vw] bg-white p-4 rounded-xl border border-gray-200 mx-2 shadow-sm h-[60vh] overflow-y-auto">
                            <h3 class="font-bold text-lg border-b pb-2 mb-4 bg-blue-100 text-blue-800 px-3 py-1 rounded inline-block">${d}日目</h3>`;
            dayItems.forEach(item => {
                html += `<div class="mb-4 pl-4 border-l-2 border-blue-400">
                            <p class="font-bold text-sm text-gray-500">${item.time}</p>
                            <p class="font-bold text-lg">${item.title}</p>
                            <p class="text-sm text-gray-600 whitespace-pre-wrap">${item.comment}</p>
                         </div>`;
            });
            if(dayItems.length === 0) html += `<p class="text-gray-400">予定がありません</p>`;
            html += `<button class="mt-4 text-blue-500 font-bold text-sm"><i class="fa-solid fa-plus"></i> スケジュールを詳細に追加する</button></div>`;
            tc.innerHTML += html;
        }
    }
</script>
</body>
</html>
