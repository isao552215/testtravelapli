<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅行スケジュール日程＆費用管理アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f3f4f6;
            padding-bottom: 120px;
        }
        .screen { display: none; }
        .screen.active { display: block; }
        .wbs-scroll::-webkit-scrollbar { height: 6px; }
        .wbs-scroll::-webkit-scrollbar-track { background: #e5e7eb; border-radius: 4px; }
        .wbs-scroll::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 4px; }
        .rainy-alt { transition: all 0.3s ease; max-height: 0; opacity: 0; overflow: hidden; margin-top: 0; }
        .rainy-mode-active .rainy-alt { max-height: 100px; opacity: 1; margin-top: 0.5rem; padding: 0.5rem; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .sync-spinner { animation: spin 1s linear infinite; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0,0,0,0.6);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            border-radius: 1rem;
            width: 90%;
            max-width: 450px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .day-panel {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 220px);
            min-height: 500px;
            background: white;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }
        .day-map-header {
            flex-shrink: 0;
            background: #f3f4f6;
            border-bottom: 2px solid #e5e7eb;
            padding: 10px 12px 12px;
        }
        .day-schedule-body {
            flex: 1 1 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px 12px 80px;
        }
        .day-schedule-body::-webkit-scrollbar { width: 4px; }
        .day-schedule-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
    </style>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log('Service Worker Registered'))
          .catch((err) => console.error('Service Worker Registration Failed', err));
      }
    </script>
</head>
<body class="p-2 sm:p-4 max-w-4xl mx-auto text-gray-800 relative text-sm sm:text-base">

    <!-- 共通通知トースト -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 -translate-y-4 bg-gray-800 text-white px-5 py-3 rounded-full text-sm font-bold transition-all duration-300 opacity-0 pointer-events-none z-[20000] shadow-lg flex items-center gap-2">
        <i class="fa-solid fa-bell"></i> <span id="toast-msg">通知</span>
    </div>

    <!-- 保存ボタン (ダッシュボード画面用) -->
    <button id="floating-save-btn" onclick="saveToCloud()" class="fixed bottom-6 right-4 sm:right-8 bg-gray-400 text-white font-bold px-5 py-4 rounded-full shadow transition-all duration-300 z-[9000] flex items-center gap-2 opacity-50 pointer-events-none scale-90 origin-bottom-right hidden">
        <i class="fa-solid fa-check"></i> 保存済
    </button>


    <!-- ================= 画面1: 認証＆メニュー選択画面 ================= -->
    <div id="screen-start" class="screen active min-h-[80vh] flex flex-col items-center justify-center">
        <div class="bg-white p-8 rounded-2xl shadow-xl text-center max-w-md w-full border border-gray-100">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4 shadow-inner">
                <i class="fa-solid fa-compass animate-pulse"></i>
            </div>
            <h1 class="text-2xl font-bold mb-1 tracking-tight text-gray-900">Travel Planner</h1>
            <p class="text-gray-400 text-xs mb-8">旅程＆費用スマート管理システム</p>
            
            <!-- 模擬ログインボタン -->
            <button id="login-btn" onclick="handleLogin()" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-3 shadow-sm hover:bg-gray-50 hover:border-gray-400 transition-all mb-6">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" class="w-5 h-5">
                Googleアカウントでサインイン
            </button>

            <!-- ログイン後メニュー -->
            <div id="menu-options" class="hidden flex-col gap-3 transition-all duration-500 transform translate-y-2 opacity-0">
                <div class="text-left bg-emerald-50 text-emerald-800 text-xs font-bold p-3 rounded-lg mb-2 flex items-center gap-2">
                    <i class="fa-solid fa-circle-check"></i> アカウント認証に成功しました
                </div>
                <button onclick="switchScreen('screen-create')" class="w-full bg-gradient-to-r from-blue-600 to-teal-500 text-white font-bold py-3.5 rounded-xl shadow-md hover:opacity-95 transition-opacity flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus-circle text-lg"></i> 新規旅行スケジュールを作成
                </button>
                <button onclick="loadFromCloud(true, true)" class="w-full bg-gray-100 text-gray-700 font-bold py-3.5 rounded-xl shadow-sm border border-gray-200 hover:bg-gray-200 transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left"></i> 過去に保存した記録を呼び出す
                </button>
            </div>
        </div>
    </div>


    <!-- ================= 画面2: 新規旅行先・条件入力画面 ================= -->
    <div id="screen-create" class="screen pb-10">
        <header class="bg-gradient-to-r from-blue-600 to-teal-500 text-white p-4 rounded-xl shadow-md mb-4 flex items-center gap-3">
            <button onclick="switchScreen('screen-start')" class="text-white hover:bg-white/20 p-2 rounded-full transition-colors"><i class="fa-solid fa-arrow-left"></i></button>
            <h1 class="text-lg font-bold">新規旅行プランの作成</h1>
        </header>

        <div class="bg-white p-5 sm:p-6 rounded-xl shadow-sm space-y-5 border border-gray-200">
            <div>
                <label class="block text-gray-700 font-bold mb-1.5 text-sm">旅行先・プラン名（メイン目的地）</label>
                <input type="text" id="trip-dest" placeholder="例) 佐賀・福岡、北海道、京都など" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all font-bold">
            </div>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-1.5 text-sm">出発日時（帰着カウント開始）</label>
                    <input type="datetime-local" id="trip-start" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white focus:outline-none text-sm font-medium">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1.5 text-sm">帰宅予定日時</label>
                    <input type="datetime-local" id="trip-end" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white focus:outline-none text-sm font-medium">
                </div>
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-1.5 text-sm">メインイベントを行う日 (任意)</label>
                <input type="date" id="trip-main-date" class="w-full p-3 border border-gray-300 rounded-lg bg-gray-50 focus:bg-white focus:outline-none text-sm text-gray-600">
                <p class="text-[11px] text-gray-400 mt-1">※出発日と異なる日にメインイベントがある場合、そこまでの旅程枠を自動調整します。</p>
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2 text-sm">この旅行でやりたいアクティビティ（複数選択）</label>
                <div class="grid grid-cols-2 gap-2.5 text-xs sm:text-sm">
                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors"><input type="checkbox" class="activity-cb accent-blue-600 w-4 h-4" value="グルメ・ご当地食"> <span>🍜 グルメ・食べ歩き</span></label>
                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors"><input type="checkbox" class="activity-cb accent-blue-600 w-4 h-4" value="温泉・リフレッシュ"> <span>♨️ 温泉・サウナ</span></label>
                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors"><input type="checkbox" class="activity-cb accent-blue-600 w-4 h-4" value="絶景・自然観光"> <span>📸 絶景・自然スポット</span></label>
                    <label class="flex items-center gap-2 p-3 border rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors"><input type="checkbox" class="activity-cb accent-blue-600 w-4 h-4" value="神社仏閣・歴史巡り"> <span>⛩️ 神社仏閣・史跡</span></label>
                </div>
            </div>
            
            <button onclick="generateInitialSchedule()" class="w-full mt-2 bg-gradient-to-r from-blue-600 to-teal-500 text-white font-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-opacity text-base flex items-center justify-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> 初期旅行スケジュールを自動作成する
            </button>
        </div>
    </div>


    <!-- ================= 画面3: メインスケジュール管理ダッシュボード ================= -->
    <div id="screen-dashboard" class="screen">
        <header class="bg-gradient-to-r from-blue-600 to-teal-500 text-white p-4 rounded-xl shadow-md mb-4 relative overflow-hidden flex flex-col justify-center items-center">
            <h1 id="dashboard-title" class="text-xl sm:text-2xl font-bold tracking-wider relative z-10"><i class="fa-solid fa-compass mr-2"></i> 旅行日程ダッシュボード</h1>
            <div id="sync-status" class="absolute top-2 right-2 bg-white/20 px-2 py-1 rounded text-xs font-bold backdrop-blur-sm hidden items-center gap-1">
                <i class="fa-solid fa-cloud-arrow-up sync-spinner"></i> 通信中...
            </div>
            <button onclick="loadFromCloud(true)" class="absolute bottom-2 right-2 bg-white/20 hover:bg-white/30 transition-colors px-2 py-1 rounded text-xs font-bold backdrop-blur-sm shadow flex items-center gap-1 cursor-pointer">
                <i class="fa-solid fa-arrows-rotate"></i> クラウド同期
            </button>
            <button onclick="switchScreen('screen-start')" class="absolute top-2 left-2 bg-white/10 hover:bg-white/20 text-white px-2 py-1 rounded text-xs font-bold flex items-center gap-1">
                <i class="fa-solid fa-house"></i> メニュー
            </button>
        </header>

        <div id="initial-loading" class="bg-white p-8 rounded-xl shadow-sm mb-4 text-center text-gray-500 hidden">
            <i class="fa-solid fa-spinner text-4xl mb-3 sync-spinner text-blue-500"></i>
            <p class="font-bold text-sm">クラウドからデータを取得しています...</p>
        </div>

        <div id="app-content">
            <!-- WBS進捗 -->
            <section class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-200">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-sm font-bold text-gray-700 flex items-center gap-1"><i class="fa-solid fa-chart-gantt text-blue-500"></i> 全行程WBS進捗</h2>
                    <span class="text-xs font-semibold bg-blue-100 text-blue-700 px-3 py-1 rounded-full" id="wbs-progress-text">0/0 完了 (0%)</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3 mb-4">
                    <div id="wbs-progress-bar" class="bg-gradient-to-r from-blue-500 to-teal-400 h-3 rounded-full transition-all duration-300" style="width:0%"></div>
                </div>
                <div id="wbs-wrapper" class="wbs-scroll overflow-x-auto flex gap-2 pb-2 text-center text-xs whitespace-nowrap"></div>
            </section>

            <!-- カレンダー -->
            <section class="bg-white p-3 rounded-xl shadow-sm mb-4 max-w-sm mx-auto border border-gray-200">
                <div id="calendar-title" class="text-sm font-bold text-gray-700 text-center mb-2 flex items-center justify-center gap-1"><i class="fa-regular fa-calendar-days text-teal-500"></i> 旅行日程</div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center text-xs"></div>
            </section>

            <div class="space-y-4">
                <!-- 費用シミュレーター -->
                <section class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
                    <div class="flex justify-between items-center mb-3 pb-2 border-b border-gray-200">
                        <h2 class="text-sm sm:text-base font-bold text-gray-800 flex items-center gap-2"><i class="fa-solid fa-calculator text-amber-500"></i> 費用シミュレーター</h2>
                        <button onclick="loadFromCloud(true)" class="bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded text-xs font-bold text-gray-600 shadow-sm flex items-center gap-1 border border-gray-300">
                            <i class="fa-solid fa-rotate-left"></i> リセット
                        </button>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        <div class="bg-blue-50/50 p-3 rounded-lg border border-blue-100 flex flex-col">
                            <h3 class="text-sm font-bold text-blue-700 mb-2 flex items-center gap-1"><i class="fa-solid fa-wallet"></i> 事前徴収分</h3>
                            <div id="advance-costs-container" class="space-y-2 flex-grow"></div>
                            <button onclick="addAdvanceCost()" class="mt-2 w-full bg-blue-100 hover:bg-blue-200 text-blue-700 text-sm font-bold py-2 rounded border border-blue-300"><i class="fa-solid fa-plus"></i> 追加</button>
                            <div class="text-right text-blue-800 font-bold border-t border-blue-300 pt-2 mt-3 text-base">事前小計: ¥<span id="subtotal-pre">0</span></div>
                        </div>
                        <div class="bg-amber-50/50 p-3 rounded-lg border border-amber-100 flex flex-col">
                            <h3 class="text-sm font-bold text-amber-700 mb-2 flex items-center gap-1"><i class="fa-solid fa-coins"></i> 都度支払い分</h3>
                            <div id="payg-costs-container" class="space-y-2 flex-grow"></div>
                            <button onclick="addPaygCost()" class="mt-2 w-full bg-amber-100 hover:bg-amber-200 text-amber-800 text-sm font-bold py-2 rounded border border-amber-300"><i class="fa-solid fa-plus"></i> 追加</button>
                            <div class="text-right text-amber-800 font-bold border-t border-amber-300 pt-2 mt-3 text-base">都度小計: ¥<span id="subtotal-post">0</span></div>
                        </div>
                    </div>
                    <div class="mt-4 bg-gradient-to-r from-gray-800 to-gray-700 text-white p-4 rounded-lg flex justify-between items-center shadow-inner">
                        <span class="text-sm font-bold tracking-wider"><i class="fa-solid fa-receipt mr-1 text-teal-400"></i> 総合計 (1人あたり)</span>
                        <span class="text-xl sm:text-2xl font-black text-teal-300">¥<span id="total-cost">0</span></span>
                    </div>
                </section>

                <!-- スケジュール -->
                <section class="bg-transparent" id="schedule-section">
                    <div class="bg-white p-4 rounded-xl shadow-sm mb-3 flex flex-wrap justify-between items-center gap-3 relative z-50 border border-gray-200">
                        <h2 class="text-base font-bold text-gray-800 flex items-center gap-2"><i class="fa-solid fa-route text-blue-500"></i> スケジュール詳細</h2>
                        <div class="flex items-center gap-2">
                            <label class="flex items-center cursor-pointer bg-blue-50 border border-blue-200 px-3 py-1.5 rounded text-sm font-bold text-blue-700 shadow-sm hover:bg-blue-100">
                                <input type="checkbox" id="rainy-toggle" class="mr-1.5 accent-blue-600 w-4 h-4" onchange="toggleRainyMode()">
                                <i class="fa-solid fa-umbrella mr-1"></i> 雨天モード
                            </label>
                            <button onclick="openAddModal()" class="bg-gradient-to-r from-blue-600 to-teal-500 text-white hover:opacity-90 font-bold px-4 py-1.5 rounded text-sm shadow-sm"><i class="fa-solid fa-plus"></i> 予定追加</button>
                        </div>
                    </div>

                    <!-- 日タブ -->
                    <div id="day-tabs" class="flex overflow-x-auto gap-2 mb-3 pb-2 hide-scrollbar px-1"></div>

                    <!-- スライドタイムラインコンテナ -->
                    <div id="timeline-container" class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar items-stretch pb-4 -mx-1 sm:-mx-2"></div>

                    <div class="mt-6 mb-6 flex flex-col items-center gap-3">
                        <button onclick="addTravelDay()" class="bg-indigo-100 text-indigo-700 hover:bg-indigo-200 font-bold px-6 py-3 rounded-full border border-indigo-200 text-sm shadow-sm"><i class="fa-solid fa-calendar-plus mr-1"></i> 新しい日程（〇日目）を追加</button>
                    </div>
                </section>
            </div>

            <footer class="mt-8 text-center text-gray-400 text-xs pb-6">
                <p>© 旅行日程＆費用管理ダッシュボード PWA</p>
            </footer>
        </div>
    </div>

    <!-- 各種確認モーダル群 (確認、追加、編集) -->
    <div id="custom-confirm-modal" class="modal-overlay hidden z-[30000]">
        <div class="modal-content p-6 max-w-sm mx-auto text-center relative">
            <div class="text-4xl mb-4 text-amber-500"><i class="fa-solid fa-circle-exclamation"></i></div>
            <p id="custom-confirm-msg" class="font-bold text-gray-800 mb-6 text-sm whitespace-pre-wrap leading-relaxed">確認</p>
            <div class="flex gap-3 justify-center">
                <button id="custom-confirm-ok" class="bg-red-500 hover:bg-red-600 text-white font-bold px-6 py-3 rounded-lg text-sm flex-1">はい</button>
                <button id="custom-confirm-cancel" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold px-6 py-3 rounded-lg text-sm flex-1">キャンセル</button>
            </div>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay hidden" onclick="closeModalsOnBgClick(event,'add-modal')">
        <div class="modal-content p-6 relative">
            <button onclick="closeAddModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
            <h3 class="text-base font-bold text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-circle-plus text-teal-600"></i> 新しい予定の追加</h3>
            <form id="add-item-form" onsubmit="handleAddItem(event)" class="space-y-4 text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block text-gray-600 mb-1 font-medium">日程</label><select id="new-day" class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white font-bold"></select></div>
                    <div><label class="block text-gray-600 mb-1 font-medium">時間（HH:MM）</label><input type="text" id="new-time" placeholder="例) 12:00" required class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white text-sm"></div>
                </div>
                <div><label class="block text-gray-600 mb-1 font-medium">スポット名・予定</label><input type="text" id="new-title" required class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white font-bold text-sm"></div>
                <div class="grid grid-cols-1 gap-3">
                    <div><label class="block text-gray-600 mb-1 font-medium"><i class="fa-brands fa-youtube text-red-500"></i> YouTube URL</label><input type="url" id="new-youtube" class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white text-sm"></div>
                    <div><label class="block text-gray-600 mb-1 font-medium"><i class="fa-solid fa-link text-blue-500"></i> Map/参考 URL</label><input type="url" id="new-map" class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white text-sm"></div>
                </div>
                <div class="pt-4"><button type="submit" class="w-full bg-gradient-to-r from-teal-600 to-blue-600 text-white font-bold py-3.5 rounded shadow-md hover:opacity-90 transition-all text-base"><i class="fa-solid fa-plus mr-1"></i> 追加する（未保存）</button></div>
            </form>
        </div>
    </div>

    <div id="edit-modal" class="modal-overlay hidden" onclick="closeModalsOnBgClick(event,'edit-modal')">
        <div class="modal-content p-6 relative">
            <button onclick="closeEditModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><i class="fa-solid fa-xmark text-lg"></i></button>
            <h3 class="text-base font-bold text-gray-800 mb-4 border-b pb-2"><i class="fa-solid fa-pen-to-square text-blue-500"></i> 予定の編集</h3>
            <form id="edit-item-form" onsubmit="submitEdit(event)" class="space-y-4 text-sm">
                <input type="hidden" id="edit-id">
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block text-gray-600 mb-1 font-medium">日程</label><select id="edit-day" class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white font-bold"></select></div>
                    <div><label class="block text-gray-600 mb-1 font-medium">時間（並び替え用）</label><input type="text" id="edit-time" required class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white text-sm"></div>
                </div>
                <div><label class="block text-gray-600 mb-1 font-medium">スポット名</label><input type="text" id="edit-title" required class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white font-bold text-sm"></div>
                <div class="grid grid-cols-1 gap-3">
                    <div><label class="block text-gray-600 mb-1 font-medium">YouTube URL</label><input type="url" id="edit-youtube" class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white text-sm"></div>
                    <div><label class="block text-gray-600 mb-1 font-medium">Map URL</label><input type="url" id="edit-map" class="w-full p-2.5 border border-gray-300 rounded bg-gray-50 focus:bg-white text-sm"></div>
                </div>
                <div class="pt-4"><button type="submit" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded shadow-md hover:bg-blue-700 text-base">修正を適用する（未保存）</button></div>
            </form>

// ★ 要望ロジック: 新規旅行情報の入力から初期スケジュールを自動埋め立て生成
function generateInitialSchedule() {
    const dest = document.getElementById('trip-dest').value.trim();
    const startRaw = document.getElementById('trip-start').value;
    const endRaw = document.getElementById('trip-end').value;
    const mainDateRaw = document.getElementById('trip-main-date').value;

    if (!dest || !startRaw || !endRaw) {
        showToast("目的先、出発日、帰宅日を入力してください", true);
        return;
    }

    const startDate = new Date(startRaw);
    const endDate = new Date(endRaw);

    if (endDate <= startDate) {
        showToast("帰宅日時は出発日時より後に設定してください", true);
        return;
    }

    // 日数の計算 (1日単位切り上げ)
    const msDiff = endDate.getTime() - startDate.getTime();
    const totalDays = Math.max(1, Math.ceil(msDiff / (1000 * 60 * 60 * 24)));

    // 選択されたアクティビティの抽出
    let selectedActs = [];
    document.querySelectorAll('.activity-cb:checked').forEach(cb => {
        selectedActs.push(cb.value);
    });

    // メイン日（何日目か）の算出
    let mainDayNum = 1;
    if (mainDateRaw) {
        const mainDate = new Date(mainDateRaw + "T00:00:00");
        const startZero = new Date(startDate.getFullYear(), startDate.getMonth(), startDate.getDate());
        const dayDiff = Math.floor((mainDate - startZero) / (1000 * 60 * 60 * 24)) + 1;
        if (dayDiff >= 1 && dayDiff <= totalDays) {
            mainDayNum = dayDiff;
        }
    }

    // アプリ状態を新規クリーンビルド
    appState = {
        travelDays: totalDays,
        planTitle: dest,
        startDateStr: `${startDate.getMonth()+1}/${startDate.getDate()}`,
        advanceCosts: [{ id: Date.now(), name: "交通・移動基本費", total: 0, people: 1 }],
        paygCosts: [{ id: Date.now()+1, name: "現地食事・雑費枠", amount: 3000 }],
        statuses: {},
        itinerary: []
    };

    const startTimeStr = startDate.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    const endTimeStr = endDate.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });

    // 1日目枠: 出発処理
    appState.itinerary.push({
        id: 1001, day: 1, time: startTimeStr,
        title: `${dest}へ向けて出発`, map: "", comment: "荷物、チケット最終確認をして移動開始。"
    });

    // メイン目的日の枠組み立て
    let commentStr = "旅行の主目的を遂行します！\n\n【やりたいアクティビティ枠】\n" + 
                     (selectedActs.length > 0 ? selectedActs.map(a => "・" + a).join("\n") : "・現地散策・自由行動");
    
    appState.itinerary.push({
        id: 1002, day: mainDayNum, time: "11:00〜15:00",
        title: `★メイン目的・イベント遂行 [${dest}]`, map: "", comment: commentStr
    });

    // 最終日枠: 帰路処理
    appState.itinerary.push({
        id: 1003, day: totalDays, time: endTimeStr,
        title: "帰宅完了予定", map: "", comment: "お土産を確認し、帰宅の途につきます。"
    });

    sortItinerary();
    
    // タイトルの変更とUI更新
    document.getElementById('dashboard-title').innerHTML = `<i class="fa-solid fa-compass mr-2"></i> ${dest}旅程ダッシュボード`;
    document.getElementById('calendar-title').innerHTML = `<i class="fa-regular fa-calendar-days text-teal-500"></i> 旅行日程（${appState.startDateStr}〜）`;
    
    switchScreen('screen-dashboard');
    renderAll();
    markUnsaved(); // 新規登録枠のため即保存可能状態へ変更
    showToast("初期スケジュール枠を自動生成しました！");
}

function sortItinerary(){
    appState.itinerary.sort((a,b)=>{
        if(a.day!==b.day) return a.day-b.day;
        function mins(t){
            if(!t) return 9999;
            const m=t.match(/(\d{1,2})[:：](\d{2})/);
            if(m) return parseInt(m[1])*60+parseInt(m[2]);
            const h=t.match(/(\d{1,2})時/);
            if(h) return parseInt(h[1])*60;
            return 9999;
        }
        return mins(a.time)-mins(b.time);
    });
}

/* ===== GAS API通信処理群 ===== */
function buildGetUrl(){
    const u=new URL(GAS_WEB_APP_URL);
    u.searchParams.set('nocache',Date.now());
    return u.toString();
}
async function gasGet(url){
    const r=await fetch(url,{method:'GET',mode:'cors',cache:'no-store'});
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}
async function gasPost(payload){
    await fetch(GAS_WEB_APP_URL,{method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
    await new Promise(r=>setTimeout(r,800));
    return gasGet(buildGetUrl());
}

/* ===== クラウドデータ同期制御 ===== */
async function loadFromCloud(isManual=false, fromStartMenu=false){
    if(GAS_WEB_APP_URL.includes('ここにURL')){
        appState=JSON.parse(JSON.stringify(fallbackInitialData));
        sortItinerary();
        if(fromStartMenu) switchScreen('screen-dashboard');
        renderAll(); return;
    }
    if(isManual) showSync(true);
    document.getElementById('initial-loading').classList.remove('hidden');
    try{
        const data=await gasGet(buildGetUrl());
        const isFirst=!data.appState||data.appState.isNew;
        if(isFirst){
            appState=JSON.parse(JSON.stringify(fallbackInitialData));
            sortItinerary(); cloudPhotos=[];
            clearUnsaved(); renderAll();
            if(fromStartMenu) switchScreen('screen-dashboard');
            await saveToCloud(true);
        } else {
            appState=data.appState; currentTimestamp=data.timestamp;
            if(!appState.statuses)     appState.statuses={};
            if(!appState.advanceCosts) appState.advanceCosts=[];
            if(!appState.paygCosts)    appState.paygCosts=[];
            if(!appState.itinerary)    appState.itinerary=[];
            if(!appState.travelDays)   appState.travelDays=1;
            if(!appState.planTitle)    appState.planTitle="登録旅行";
            if(!appState.startDateStr) appState.startDateStr="07/14";
            cloudPhotos=data.photos||[];
            sortItinerary();
            clearUnsaved();
            
            document.getElementById('dashboard-title').innerHTML = `<i class="fa-solid fa-compass mr-2"></i> ${appState.planTitle}旅程ダッシュボード`;
            document.getElementById('calendar-title').innerHTML = `<i class="fa-regular fa-calendar-days text-teal-500"></i> 旅行日程（${appState.startDateStr}〜）`;
            
            if(fromStartMenu) switchScreen('screen-dashboard');
            renderAll();
            if(isManual) showToast('最新データを呼び出しました✨');
        }
    } catch(e){
        console.warn('[GAS失敗] オフラインフォールバック',e.message);
        appState=JSON.parse(JSON.stringify(fallbackInitialData));
        sortItinerary(); cloudPhotos=[];
        clearUnsaved(); 
        if(fromStartMenu) switchScreen('screen-dashboard');
        renderAll();
        showToast('オフライン（またはフォールバックデータ）で起動しました',true);
    } finally {
        document.getElementById('initial-loading').classList.add('hidden');
        if(isManual) showSync(false);
    }
}

async function saveToCloud(force=false){
    if(GAS_WEB_APP_URL.includes('ここにURL')) return;
    showSync(true);
    try{
        if(!force){
            const latest=await gasGet(buildGetUrl());
            if(latest.timestamp&&latest.timestamp>currentTimestamp){
                showCustomConfirm('【警告】他の端末でデータが更新されています。\n上書き保存してよろしいですか？',
                    async()=>{ await saveToCloud(true); },
                    ()=>{ hasUnsavedChanges=false; loadFromCloud(false); }
                ); return;
            }
        }
        const data=await gasPost({action:'saveAll',payload:appState,lastTimestamp:currentTimestamp,force});
        if(data.timestamp&&data.timestamp>=currentTimestamp){
            currentTimestamp=data.timestamp;
            appState=data.appState||appState;
            cloudPhotos=data.photos||cloudPhotos;
            clearUnsaved(); renderAll();
            for(let d=1;d<=appState.travelDays;d++) refreshDayMap(d);
            showToast('新しいデータに更新保存しました！');
        } else {
            showToast('⚠️ データ反映が不安定な可能性があります。',true);
        }
    } catch(e){ console.error(e); showToast('保存に失敗しました。',true); }
    finally{ showSync(false); }
}

function renderCalendar(){
    const c=document.getElementById('calendar-grid');
    c.innerHTML='';
    ['日','月','火','水','木','金','土'].forEach(d=>c.innerHTML+=`<div class="text-gray-400 font-medium">${d}</div>`);
    
    // 開始起点を柔軟にモデリング
    let startDay = 14;
    if(appState.startDateStr) {
        const p = appState.startDateStr.split('/');
        if(p.length===2) startDay = parseInt(p[1]) || 14;
    }
    const startOffset=startDay - 2, travelStart=startDay;
    const total=Math.max(14,Math.ceil((appState.travelDays+(travelStart-startOffset))/7)*7);
    for(let i=0;i<total;i++){
        const cur=startOffset+i, dn=cur-travelStart+1;
        let dd=cur, ms='';
        if(dd>31){dd-=31;ms='8/';}
        if(dn>=1&&dn<=appState.travelDays){
            const s=getDayStyle(dn);
            c.innerHTML+=`<div class="${s.bg} text-white font-bold rounded shadow-sm py-1.5 relative h-12 flex flex-col items-center justify-center"><span class="text-sm">${dd}</span><span class="absolute bottom-1 text-[9px] scale-90 leading-none w-full text-center opacity-90">${dn}日目</span></div>`;
        } else {
            c.innerHTML+=`<div class="text-gray-400 py-1.5 h-12 flex items-center justify-center text-sm">${dd}</div>`;
        }
    }
}

function buildMapHtml(d, dayItems){
    let routeNodes=dayItems.filter(i=>
        !i.title.includes('移動中')&&!i.title.includes('チェックイン')&&!i.title.includes('空港')&&
        appState.statuses[i.id]!=='1'&&appState.statuses[i.id]!=='2'
    );
    const targetItems=dayItems.filter(i=>!i.title.includes('移動中')&&!i.title.includes('チェックイン')&&!i.title.includes('空港'));
    const isDayComplete=targetItems.length>0&&targetItems.every(i=>appState.statuses[i.id]==='1'||appState.statuses[i.id]==='2');

    if(isDayComplete){
        const ids=new Set([...dayItems.map(i=>i.id),...dayItems.map(i=>String(i.id))]);
        const photos=cloudPhotos.filter(p=>ids.has(p.itemId)||ids.has(String(p.itemId)));
        const sid=`slideshow-day${d}`;
        if(photos.length>0){
            const first=photos[Math.floor(Math.random()*photos.length)];
            return {html:`
                <div id="${sid}" class="w-full h-[180px] rounded-xl overflow-hidden relative border-2 border-yellow-300 shadow-sm">
                    <div id="${sid}-bg" class="absolute inset-0 bg-cover bg-center transition-opacity duration-1000" style="background-image:url('${first.thumbnailUrl}');"></div>
                    <div class="absolute inset-0 bg-black/40 backdrop-blur-[1px]"></div>
                    <div class="relative z-10 flex flex-col items-center justify-center h-full p-2 text-center">
                        <p class="text-xs font-black text-white">🎉 日程コンプリート！</p>
                        <p class="text-xs text-yellow-300 font-bold">${photos.length}枚の写真履歴あり</p>
                    </div>
                </div>`, isDayComplete:true, photos };
        } else {
            return {html:`
                <div class="w-full h-[100px] rounded-xl p-3 text-center border border-yellow-200 bg-gradient-to-br from-yellow-50 to-orange-50 flex flex-col items-center justify-center">
                    <p class="text-xs font-bold text-amber-700">🎉 ${d}日目の全スポット達成！</p>
                </div>`, isDayComplete:true, photos:[] };
        }
    }

    if(routeNodes.length>9) routeNodes=routeNodes.slice(0,9);
    if(routeNodes.length<1) return {html:'', isDayComplete:false, photos:[]};

    const origin=encodeURIComponent(routeNodes[0].title);
    const dest=encodeURIComponent(routeNodes[routeNodes.length-1].title);
    let wp='';
    if(routeNodes.length>2) wp='&waypoints='+routeNodes.slice(1,-1).map(i=>encodeURIComponent(i.title)).join('|');
    let fullUrl, embedUrl;
    if(routeNodes.length===1){
        fullUrl=`https://maps.google.com/?q=${origin}`;
        embedUrl=`https://maps.google.com/maps?q=${origin}&output=embed&z=13`;
    } else {
        fullUrl=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}${wp}`;
        let da=dest;
        if(routeNodes.length>2){const wps=routeNodes.slice(1,-1).map(i=>encodeURIComponent(i.title)).join('+to:');da=wps+'+to:'+da;}
        embedUrl=`https://maps.google.com/maps?saddr=${origin}&daddr=${da}&output=embed&z=10`;
    }
    return {html:`
        <div class="bg-gray-100 rounded-lg border border-gray-300 shadow-sm overflow-hidden text-xs">
            <div class="w-full h-[200px] bg-white">
                <iframe width="100%" height="100%" frameborder="0" src="${embedUrl}"></iframe>
            </div>
            <div class="flex justify-between items-center p-2 bg-white border-t">
                <a href="${fullUrl}" target="_blank" class="text-blue-600 font-bold inline-flex items-center gap-1"><i class="fa-solid fa-arrow-up-right-from-square"></i> Googleマップアプリでルート開く</a>
            </div>
        </div>`, isDayComplete:false, photos:[] };
}

            const tab=document.createElement('button');

            tab.innerHTML=`${d}日目`;
            tab.onclick=()=>{

            };

        }

        const wbsDay=document.createElement('div');
        wbsDay.className='flex items-center gap-1.5 border-r border-gray-300 pr-2';
        wbsDay.innerHTML=`<span class="${style.bg} text-white font-bold px-2 py-0.5 rounded text-xs whitespace-nowrap">${d}日目</span>`;
        wbsWrapper.appendChild(wbsDay);

        const {html:mapHtml, isDayComplete, photos:dphotos}=buildMapHtml(d,dayItems);

        const slideItem=document.createElement('div');
        slideItem.id=`day-slide-${d}`;
        slideItem.className='w-full min-w-full shrink-0 snap-center px-1 sm:px-2';

        const panel=document.createElement('div');
        panel.className='day-panel';

        const mapHeader=document.createElement('div');
        mapHeader.className='day-map-header';
        mapHeader.innerHTML=`
            <div class="flex justify-between items-center mb-2">
                <div class="${style.bg} text-white px-3 py-1 rounded-md text-xs font-bold shadow-sm">${d}日目</div>
                <button onclick="removeTravelDay(${d})" class="text-[11px] text-red-500 font-bold border border-red-200 px-2 py-1 rounded bg-red-50"><i class="fa-solid fa-trash"></i> 削除</button>
            </div>
            <div id="map-zone-${d}">${mapHtml}</div>
        `;
        panel.appendChild(mapHeader);

        const schedBody=document.createElement('div');
        schedBody.className='day-schedule-body';

        const timeline=document.createElement('div');
        timeline.id=`timeline-day${d}`;
        timeline.className=`space-y-0 border-l-2 ${style.border} ml-2 pl-4 relative min-h-[40px]`;
        if(dayItems.length===0){
            timeline.innerHTML='<div class="text-xs text-gray-400 italic py-2">予定枠がありません。</div>';
        }
        schedBody.appendChild(timeline);
        panel.appendChild(schedBody);
        slideItem.appendChild(panel);
        tc.appendChild(slideItem);

        newDay.innerHTML+=`<option value="${d}">${d}日目</option>`;
        editDay.innerHTML+=`<option value="${d}">${d}日目</option>`;

        dayItems.forEach((item,idx)=>{
            const node=document.createElement('div');
            node.id=`wbs-node-${item.id}`;
            node.className='w-6 h-6 rounded-full flex shrink-0 items-center justify-center font-bold border text-[10px] text-white bg-gray-400';
            node.title=item.title;
            node.textContent=item.title.substring(0,1);
            wbsDay.appendChild(node);

            const card=document.createElement('div');
            card.id=`item-box-${item.id}`;
            card.className='relative p-3 rounded-xl border shadow-sm transition-all bg-white border-gray-200 mb-4 text-xs';
            const status=appState.statuses[item.id]||'0';
            
            let links='';
            if(item.youtube) links+=`<a href="${item.youtube}" target="_blank" class="bg-red-600 text-white text-[10px] px-2 py-1 rounded shadow-sm"><i class="fa-brands fa-youtube"></i> 動画</a> `;
            if(item.map)     links+=`<a href="${item.map}" target="_blank" class="bg-blue-600 text-white text-[10px] px-2 py-1 rounded shadow-sm"><i class="fa-solid fa-link"></i> 参考</a> `;
            
            card.innerHTML=`

                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-start gap-1">
                        <div>
                            <span class="font-mono ${style.lightBg} ${style.text} px-1.5 py-0.5 rounded font-bold mr-1">${item.time}</span>
                            <h3 class="font-bold inline text-gray-900">${item.title}</h3>
                        </div>
                        <div class="flex items-center gap-1 shrink-0">

                        <label class="text-[11px] text-amber-600 font-bold"><input type="radio" name="status-${item.id}" value="2" ${status==='2'?'checked':''} onchange="updateStatus(${item.id},this.value)"> スキップ</label>

                    </div>

                    <div class="border-t border-dashed pt-2 mt-1">
                        <div id="photo-grid-${item.id}" class="grid grid-cols-4 gap-1.5 mb-2"></div>

                            <i class="fa-solid fa-camera"></i> 写真を追加
                            <input type="file" accept="image/*" class="hidden" onchange="triggerUpload(event,${item.id})">

                        <span id="upload-status-${item.id}" class="text-[10px] text-gray-400 ml-2"></span>
                    </div>
                </div>
            `;
            timeline.appendChild(card);
            setTimeout(()=>updateStatusDecoration(item.id,status),10);
        });

        const addBtn=document.createElement('div');
        addBtn.className='mt-3 flex gap-2';
        addBtn.innerHTML=`<button onclick="openAddModal(${d})" class="bg-gray-800 text-white font-bold px-3 py-1.5 rounded text-xs shadow-sm"><i class="fa-solid fa-plus"></i> 予定追加</button>`;
        timeline.appendChild(addBtn);
    }
    updateWBSProgress();
}

function refreshDayMap(d){
    const zone=document.getElementById(`map-zone-${d}`);
    if(!zone) return;
    const dayItems=appState.itinerary.filter(i=>i.day===d);
    const {html}=buildMapHtml(d,dayItems);
    zone.innerHTML=html;
}

function updateStatusDecoration(id,val){
    const box=document.getElementById(`item-box-${id}`);
    const node=document.getElementById(`wbs-node-${id}`);
    if(!box||!node) return;
    box.classList.remove('bg-emerald-50','border-emerald-200','bg-amber-50','border-amber-200','opacity-70');
    node.classList.remove('bg-gray-400','bg-emerald-500','bg-amber-500');
    if(val==='1'){ box.classList.add('bg-emerald-50','border-emerald-200'); node.classList.add('bg-emerald-500'); }
    else if(val==='2'){ box.classList.add('bg-amber-50','border-amber-200','opacity-70'); node.classList.add('bg-amber-500'); }
    else { node.classList.add('bg-gray-400'); }
}

function updateWBSProgress(){
    const total=appState.itinerary.length;
    let done=0;
    appState.itinerary.forEach(i=>{ if(appState.statuses[i.id]==='1') done++; });
    const pct=total>0?Math.round(done/total*100):0;
    document.getElementById('wbs-progress-bar').style.width=`${pct}%`;
    document.getElementById('wbs-progress-text').textContent=`${done}/${total} 完了 (${pct}%)`;
}
function updateComment(id,val){ const i=appState.itinerary.find(x=>x.id===id); if(i){i.comment=val;markUnsaved();} }
function updateStatus(id,val){
    appState.statuses[id]=val;
    updateStatusDecoration(id,val);
    updateWBSProgress();
    markUnsaved();
    const i=appState.itinerary.find(x=>x.id===id);
    if(i) refreshDayMap(i.day);
}

function addTravelDay(){ appState.travelDays++; renderAll(); markUnsaved(); }
function removeTravelDay(d){
    if(appState.travelDays<=1){ showToast('最低1日は必要です。',true); return; }
    showCustomConfirm(`削除すると以降の日程が繰り上がります。よろしいですか？`,()=>{
        appState.itinerary=appState.itinerary.filter(i=>i.day!==d);
        appState.itinerary.forEach(i=>{if(i.day>d) i.day--;});
        appState.travelDays--;
        renderAll(); markUnsaved();
    });
}

function openAddModal(day){
    document.getElementById('add-item-form').reset();
    if(day) document.getElementById('new-day').value=day;
    document.getElementById('add-modal').classList.remove('hidden');
}
function closeAddModal(){ document.getElementById('add-modal').classList.add('hidden'); }
function handleAddItem(e){
    e.preventDefault();
    appState.itinerary.push({ id:Date.now(), day:parseInt(document.getElementById('new-day').value), time:document.getElementById('new-time').value, title:document.getElementById('new-title').value, youtube:document.getElementById('new-youtube').value||null, map:document.getElementById('new-map').value||null, comment:'' });
    sortItinerary(); closeAddModal(); renderTimelineAndWBS(); markUnsaved();
}
function handleDeleteItem(id){
    showCustomConfirm('この予定を削除しますか？',()=>{
        const item=appState.itinerary.find(i=>i.id===id);
        appState.itinerary=appState.itinerary.filter(i=>i.id!==id);
        delete appState.statuses[id];
        renderTimelineAndWBS(); markUnsaved();
        if(item) refreshDayMap(item.day);
    });
}
function openEditModal(id){
    const item=appState.itinerary.find(i=>i.id===id); if(!item) return;
    document.getElementById('edit-id').value=item.id;
    document.getElementById('edit-day').value=item.day;
    document.getElementById('edit-time').value=item.time;
    document.getElementById('edit-title').value=item.title;
    document.getElementById('edit-youtube').value=item.youtube||'';
    document.getElementById('edit-map').value=item.map||'';
    document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEditModal(){ document.getElementById('edit-modal').classList.add('hidden'); }
function submitEdit(e){
    e.preventDefault();
    const id=parseInt(document.getElementById('edit-id').value);
    const item=appState.itinerary.find(i=>i.id===id);
    if(item){
        const oldDay = item.day;
        item.day=parseInt(document.getElementById('edit-day').value);
        item.time=document.getElementById('edit-time').value;
        item.title=document.getElementById('edit-title').value;
        item.youtube=document.getElementById('edit-youtube').value||null;
        item.map=document.getElementById('edit-map').value||null;
        sortItinerary(); renderTimelineAndWBS(); closeEditModal(); markUnsaved();
        refreshDayMap(oldDay);
        if(oldDay !== item.day) refreshDayMap(item.day);
    }
}

/* ===== 費用ロジック ===== */
function renderAllCosts(){
    const adv=document.getElementById('advance-costs-container'); adv.innerHTML='';
    appState.advanceCosts.forEach(item=>{
        const pp=Math.round((item.total||0)/(item.people||1));
        adv.innerHTML+=`
            <div class="relative bg-white p-2.5 rounded border border-blue-100 shadow-sm mb-1.5 text-xs">
                <button onclick="removeAdvanceCost(${item.id})" class="absolute top-2 right-2 text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
                <input type="text" value="${item.name}" oninput="updateAdvanceCost(${item.id},'name',this.value)" placeholder="項目名 (例:航空券)" class="w-[85%] border-b border-dashed border-gray-300 mb-2 font-bold text-gray-700 bg-transparent">
                <div class="flex items-center gap-1">
                    <input type="number" value="${item.total}" oninput="updateAdvanceCost(${item.id},'total',this.value)" class="w-16 border rounded p-1 text-right">円 ÷ 
                    <input type="number" value="${item.people}" oninput="updateAdvanceCost(${item.id},'people',this.value)" min="1" class="w-8 border rounded p-1 text-right">人 =
                    <span id="adv-pp-${item.id}" class="font-bold text-blue-700 ml-auto bg-blue-50 px-1.5 py-0.5 rounded">¥${pp.toLocaleString()}</span>
                </div>
            </div>`;
    });
    const payg=document.getElementById('payg-costs-container'); payg.innerHTML='';
    appState.paygCosts.forEach(item=>{
        payg.innerHTML+=`
            <div class="flex items-center gap-1.5 bg-white p-2.5 rounded border border-amber-100 shadow-sm mb-1.5 text-xs">
                <input type="text" value="${item.name}" oninput="updatePaygCost(${item.id},'name',this.value)" placeholder="項目名 (例:ランチ)" class="flex-grow border-b border-dashed border-gray-300 font-bold text-gray-700 bg-transparent">
                <input type="number" value="${item.amount}" oninput="updatePaygCost(${item.id},'amount',this.value)" class="w-16 border rounded p-1 text-right">
                <span>円</span>
                <button onclick="removePaygCost(${item.id})" class="text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark"></i></button>
            </div>`;
    });
    updateTotalsOnly();
}
function updateAdvanceCost(id,f,v){
    const i=appState.advanceCosts.find(c=>c.id===id);
    if(f==='total'||f==='people'){i[f]=Number(v)||0;if(i.people<1)i.people=1;const el=document.getElementById(`adv-pp-${id}`);if(el)el.textContent='¥'+Math.round(i.total/i.people).toLocaleString();}
    else i[f]=v;
    updateTotalsOnly(); markUnsaved();
}
// 費用の小計再計算
function updatePaygCost(id,f,v){
    const i=appState.paygCosts.find(c=>c.id===id);
    if(f==='amount') i[f]=Number(v)||0; else i[f]=v;
    updateTotalsOnly(); markUnsaved();
}
function updateTotalsOnly(){
    let pre=0,post=0;
    appState.advanceCosts.forEach(i=>pre+=Math.round((i.total||0)/(i.people||1)));
    appState.paygCosts.forEach(i=>post+=(i.amount||0));
    document.getElementById('subtotal-pre').textContent=pre.toLocaleString();
    document.getElementById('subtotal-post').textContent=post.toLocaleString();
    document.getElementById('total-cost').textContent=(pre+post).toLocaleString();
}
function addAdvanceCost(){ appState.advanceCosts.push({id:Date.now(),name:'',total:0,people:1}); renderAllCosts(); markUnsaved(); }
function removeAdvanceCost(id){ appState.advanceCosts=appState.advanceCosts.filter(c=>c.id!==id); renderAllCosts(); markUnsaved(); }
function addPaygCost(){ appState.paygCosts.push({id:Date.now(),name:'',amount:0}); renderAllCosts(); markUnsaved(); }
function removePaygCost(id){ appState.paygCosts=appState.paygCosts.filter(c=>c.id!==id); renderAllCosts(); markUnsaved(); }

/* ===== Googleドライブ連動: 写真ギャラリー生成 ===== */
function renderPhotos(){
    appState.itinerary.forEach(item=>{ const g=document.getElementById(`photo-grid-${item.id}`); if(g) g.innerHTML=''; });
    cloudPhotos.forEach(photo=>{
        const g=document.getElementById(`photo-grid-${photo.itemId}`); if(!g) return;
        const w=document.createElement('div');
        w.className='relative aspect-square bg-gray-100 rounded border overflow-hidden group shadow-xs';
        w.innerHTML=`<a href="${photo.viewUrl}" target="_blank"><img src="${photo.thumbnailUrl}" class="w-full h-full object-cover transition-opacity group-hover:opacity-80"></a>`;
        g.appendChild(w);
    });
}

// 選択画像をbase64に変換し、GAS経由で特定のGoogleドライブフォルダへアップロード
function triggerUpload(event,itemId){
    const file=event.target.files[0]; if(!file) return;
    const sl=document.getElementById(`upload-status-${itemId}`);
    sl.textContent='アップロード中...'; sl.className='text-[10px] text-orange-500 font-bold ml-2';
    const reader=new FileReader();
    reader.onload=async function(e){
        const b64=e.target.result.split(',')[1];
        try{
            await gasPost({action:'uploadPhoto',itemId:String(itemId),filename:file.name,contentType:file.type,base64:b64});
            sl.textContent='アップロード完了！'; sl.className='text-[10px] text-emerald-600 font-bold ml-2';
            setTimeout(()=>{sl.textContent='';loadFromCloud(false);},1000);
        } catch(err){
            console.error(err); sl.textContent='失敗'; sl.className='text-[10px] text-red-600 font-bold ml-2';
        }
    };
    reader.readAsDataURL(file);
}
