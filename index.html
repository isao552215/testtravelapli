<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-4">

    <div id="view-menu" class="max-w-md mx-auto space-y-4">
        <h1 class="text-2xl font-bold text-center mb-6">スケジュール管理</h1>
        <button onclick="createNew()" class="w-full py-4 bg-blue-600 text-white rounded-xl shadow-lg">新規スケジュール作成</button>
        <button onclick="loadHistoryList()" class="w-full py-4 bg-white border border-gray-300 rounded-xl shadow-sm">履歴から呼び出す</button>
    </div>

    <div id="view-create" class="hidden max-w-md mx-auto space-y-4">
        <button onclick="showView('view-menu')" class="text-blue-600">← メインに戻る</button>
        <h2 class="text-xl font-bold" id="view-title">基本設定</h2>
        <input type="hidden" id="edit-index" value="-1">
        <div class="space-y-3 bg-white p-4 rounded-xl shadow-sm">
            <div><label class="block text-sm font-medium">スケジュール名</label><input type="text" id="sched-name" class="w-full p-2 border rounded"></div>
            <div class="pt-2 space-y-2">
                <label class="flex items-center space-x-2"><input type="checkbox" id="start-home"> <span>出発地点を自宅にする</span></label>
                <label class="flex items-center space-x-2"><input type="checkbox" id="round-trip" onchange="toggleRoundTrip()"> <span>自宅から出発し自宅へ帰宅する</span></label>
            </div>
            <div><label class="block text-sm font-medium">出発日時</label><input type="datetime-local" id="start-time" class="w-full p-2 border rounded"></div>
            <div><label class="block text-sm font-medium">目的地</label><input type="text" id="main-dest" class="w-full p-2 border rounded"></div>
            <div><label class="block text-sm font-medium">目的の日時</label><input type="datetime-local" id="main-datetime" class="w-full p-2 border rounded"></div>
            <div id="end-home-wrapper"><label class="flex items-center space-x-2"><input type="checkbox" id="end-home"> <span>最終地点を自宅にする</span></label></div>
            <div><label class="block text-sm font-medium">帰宅予定日時</label><input type="datetime-local" id="end-datetime" class="w-full p-2 border rounded"></div>
        </div>

        <h3 class="font-bold mt-4">詳細スケジュール（経由地）</h3>
        <div id="schedule-container" class="space-y-2"></div>
        <div class="flex space-x-2">
            <button onclick="undoLast()" class="px-4 py-2 bg-gray-200 rounded-lg">元に戻す</button>
            <button onclick="addScheduleItem()" class="flex-1 py-2 bg-green-600 text-white rounded-lg">+ 日程を追加</button>
        </div>
        <button onclick="validateAndPreview()" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold">プレビューへ</button>
    </div>

    <script>
        // 履歴を読み込んでフォームにセットする関数
        function loadHistoryData(index) {
            const history = JSON.parse(localStorage.getItem('mySchedules') || '[]');
            const h = history[index];
            
            document.getElementById('edit-index').value = index;
            document.getElementById('sched-name').value = h.name;
            document.getElementById('start-time').value = h.startTime;
            document.getElementById('main-dest').value = h.mainDest;
            document.getElementById('main-datetime').value = h.mainDatetime;
            document.getElementById('end-datetime').value = h.endDatetime;
            
            document.getElementById('schedule-container').innerHTML = '';
            h.items.forEach(i => addScheduleItem(i.time, i.loc, i.note, i.url));
            
            showView('view-create');
        }

        function saveFinalSchedule() {
            const history = JSON.parse(localStorage.getItem('mySchedules') || '[]');
            const index = parseInt(document.getElementById('edit-index').value);
            
            const data = {
                name: document.getElementById('sched-name').value,
                startTime: document.getElementById('start-time').value,
                mainDest: document.getElementById('main-dest').value,
                mainDatetime: document.getElementById('main-datetime').value,
                endDatetime: document.getElementById('end-datetime').value,
                items: Array.from(document.querySelectorAll('#schedule-container > div')).map(d => ({
                    time: d.querySelector('.item-time').value,
                    loc: d.querySelector('.item-loc').value,
                    note: d.querySelector('.item-note').value,
                    url: d.querySelector('.item-url').value
                })),
                timestamp: new Date().toLocaleString()
            };

            if (index >= 0) {
                history[index] = data; // 上書き更新
            } else {
                history.push(data); // 新規追加
            }
            
            localStorage.setItem('mySchedules', JSON.stringify(history));
            alert('保存しました');
            showView('view-menu');
        }

        // 履歴一覧表示を修正
        function loadHistoryList() {
            showView('view-history');
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            JSON.parse(localStorage.getItem('mySchedules') || '[]').forEach((h, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full p-4 bg-white border rounded-lg text-left hover:bg-gray-50';
                btn.innerHTML = `<div>${h.name}</div><div class="text-xs text-gray-500">${h.timestamp}</div>`;
                btn.onclick = () => loadHistoryData(index);
                list.appendChild(btn);
            });
        }
        
        // 他の関数(showView, createNew, addScheduleItem等)は前回のコードをそのまま利用してください。
    </script>
</body>
</html>
